version: '3.9'

services:
  # =========== PostgreSQL para dados da aplicação ===========
  postgres:
    image: postgres:16-alpine
    container_name: musicas_postgres
    environment:
      POSTGRES_DB: db_usuarios_musicas
      POSTGRES_USER: musicas_user
      POSTGRES_PASSWORD: ${DB_PASS:-SenhaForte@2024!}
      POSTGRES_INITDB_ARGS: "-c client_encoding=UTF8 -c timezone=America/Sao_Paulo"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./create_db_local.sql:/docker-entrypoint-initdb.d/01-init.sql
    networks:
      - musicas_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U musicas_user -d db_usuarios_musicas"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =========== MongoDB para cache e históricos ===========
  mongodb:
    image: mongo:7-alpine
    container_name: musicas_mongodb
    environment:
      MONGO_INITDB_DATABASE: musicas
      MONGO_INITDB_ROOT_USERNAME: mongo_user
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-mongo@123}
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - musicas_network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017 -u mongo_user -p mongo@123 --authenticationDatabase admin
      interval: 10s
      timeout: 5s
      retries: 5

  # =========== SonarQube para análise de código ===========
  sonarqube:
    image: sonarqube:lts-alpine
    container_name: musicas_sonarqube
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://postgres:5432/sonarqube
      SONAR_JDBC_USERNAME: sonar_user
      SONAR_JDBC_PASSWORD: ${SONAR_DB_PASS:-sonar@123}
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLED: "true"
      SONAR_FORCEAUTHENTICATION: "false"
    ports:
      - "9000:9000"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - musicas_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/api/system/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

volumes:
  postgres_data:
    driver: local
  mongo_data:
    driver: local
  sonarqube_data:
    driver: local
  sonarqube_extensions:
    driver: local
  sonarqube_logs:
    driver: local

networks:
  musicas_network:
    driver: bridge

