spring.application.name=musicas

# PostgreSQL Configuration (hardcoded)
spring.datasource.url=jdbc:postgresql://localhost:5432/db_usuarios_musicas
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# MongoDB Configuration (mantido para rela��o usu�rio->m�sica)
spring.data.mongodb.uri=${MONGO_URI:}

# Security Configuration
spring.security.user.name=${ADMIN_USERNAME}
spring.security.user.password=${ADMIN_PASSWORD}

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration.ms=${JWT_EXPIRATION}
jwt.refreshExpiration.ms=${JWT_REFRESH_EXPIRATION}

# Logging Configuration
logging.level.org.springframework.data.mongodb.core.MongoTemplate=DEBUG
logging.level.org.springframework.jdbc.core.JdbcTemplate=DEBUG
logging.level.org.springframework.orm.jpa.JpaTransactionManager=DEBUG

# Log opcional para visualizar as queries no console (ajuda no debug)
logging.level.org.springframework.data.jpa=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Fuso Horário Brasileiro
spring.jackson.time-zone=America/Sao_Paulo
spring.jackson.date-format=dd/MM/yyyy HH:mm:ss
spring.jackson.serialization.write-dates-as-timestamps=false

# Spotify API Configuration
spotify.client.id=${SPOTIFY_CLIENT_ID:}
spotify.client.secret=${SPOTIFY_CLIENT_SECRET:}
spotify.redirect.uri=${SPOTIFY_REDIRECT_URI:https://plumaged-danilo-endermically.ngrok-free.dev/callback}

server.address=0.0.0.0
server.port=8080

# CORS Configuration
cors.allowed-origins=http://localhost:5173,http://127.0.0.1:5173,https://plumaged-danilo-endermically.ngrok-free.dev,https://mango-grass-069991f10.4.azurestaticapps.net,https://synfonia.me,https://www.synfonia.me


