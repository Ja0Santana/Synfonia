spring.application.name=musicas

# PostgreSQL Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/musicas}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# MongoDB Configuration
spring.data.mongodb.uri=${MONGO_URI}

# Security Configuration
spring.security.user.name=${ADMIN_USERNAME:admin}
spring.security.user.password=${ADMIN_PASSWORD:admin@123}

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration.ms=${JWT_EXPIRATION}
jwt.refreshExpiration.ms=${JWT_REFRESH_EXPIRATION}

# Logging Configuration
logging.level.org.springframework.data.mongodb.core.MongoTemplate=INFO
logging.level.org.springframework.jdbc.core.JdbcTemplate=INFO
logging.level.org.springframework.orm.jpa.JpaTransactionManager=INFO

# Log opcional para visualizar as queries no console
logging.level.org.springframework.data.jpa=INFO
logging.level.org.hibernate.SQL=INFO
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=INFO

# Fuso Horário Brasileiro
spring.jackson.time-zone=America/Sao_Paulo
spring.jackson.date-format=dd/MM/yyyy HH:mm:ss
spring.jackson.serialization.write-dates-as-timestamps=false

# Spotify API Configuration
spotify.client.id=${SPOTIFY_CLIENT_ID:dummy_id}
spotify.client.secret=${SPOTIFY_CLIENT_SECRET:dummy_secret}
spotify.redirect.uri=${SPOTIFY_REDIRECT_URI:http://localhost:8080/api/v1/spotify/callback}

server.address=0.0.0.0
server.port=${PORT:8080}

# CORS Configuration
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# Java Mail Configuration
spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:2525}
spring.mail.username=${MAIL_USER:user}
spring.mail.password=${MAIL_PASS:pass}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.mime.charset=UTF-8

# Application Configuration
app.frontend.url=${FRONTEND_URL:http://localhost:5173}
server.forward-headers-strategy=native
